name: bb1girl CI/CD test
run-name: ${{ github.actor }} is testing out GitHub Actions 🚀

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      
  deploy:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          cat > ~/.ssh/ci-sample-server.pem <<'EOF'
          ${{ secrets.AWS_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/ci-sample-server.pem
          ssh-keygen -y -f ~/.ssh/ci-sample-server.pem > /dev/null
          ssh-keyscan -H "${{ secrets.EC2_PUBLIC_IP }}" >> ~/.ssh/known_hosts

      - name: Copy project files to EC2
        run: |
          scp -i ~/.ssh/ci-sample-server.pem -r \
            dist \
            package.json \
            package-lock.json \
            tsconfig.json \
            tsconfig.build.json \
            ec2-user@${{ secrets.EC2_PUBLIC_IP }}:~/sample-server/

      - name: Restart app on EC2 with PM2
        run: |
          ssh -i ~/.ssh/ci-sample-server.pem ec2-user@${{ secrets.EC2_PUBLIC_IP }} '
            set -e
            mkdir -p ~/sample-server
            cd ~/sample-server
            pm2 delete sample-ci-server >/dev/null 2>&1 || true
            pm2 delete sample-server >/dev/null 2>&1 || true
            pkill -f "node /home/ec2-user/sample-server/dist/main.js" >/dev/null 2>&1 || true
            pkill -f "node dist/main" >/dev/null 2>&1 || true
            pm2 start dist/main.js --name sample-ci-server --interpreter node
            pm2 list
          '
